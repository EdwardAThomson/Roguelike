<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Rogue</title>
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="src/css/menu.css">
     


    <!-- <style>
        /* Temporary debugging styles     */
        #game-container { border: 2px solid red; }
        #ui-container { border: 2px solid green; }
        #equipment-area, #stats-area, #message-area { 
            border: 2px solid blue; 
            min-height: 50px; /* Ensure they have some height */
            margin: 5px;
        }
    </style> -->

    
</head>
<body>
    <!-- Landing Page / Menu (initially visible) -->
    <div id="landing-page">
        <div class="menu-container">
            <h1 class="game-title">Modern Rogue</h1>
            
            <div class="menu-options" id="menu-options">
                <button id="continue-btn" class="menu-btn" style="display: none;">Continue</button>
                <button id="quick-play-btn" class="menu-btn">Quick Play</button>
                <button id="multiplayer-btn" class="menu-btn">Multiplayer</button>
                <button id="options-btn" class="menu-btn">Options</button>
                <button id="credits-btn" class="menu-btn">Credits</button>
                <button id="signin-btn" class="menu-btn" style="display: none;">Sign In</button>
            </div>

            <!-- Run mode chooser, shown after Quick Play. The mode is fixed
                 for the life of the run once chosen. -->
            <div id="mode-select" class="mode-select" style="display: none;">
                <div class="mode-select-title">Choose your fate</div>
                <button class="mode-card" id="mode-adventure">
                    <div class="mode-card-name">⚔️ Adventure</div>
                    <div class="mode-card-desc">Checkpoint saves. Death sends you back to your last save.</div>
                </button>
                <button class="mode-card" id="mode-hardcore">
                    <div class="mode-card-name">💀 Hardcore</div>
                    <div class="mode-card-desc">One life. Death erases your save forever.</div>
                </button>
                <button class="mode-back" id="mode-back">‹ Back</button>
            </div>

            <div class="game-version">v0.5.0 "Crypts & Castles"</div>
            <div class="game-copyright">&copy; 2026 Edward Thomson (<a href="https://octonion.io" target="_blank" rel="noopener noreferrer">Octonion Software</a>)</div>
        </div>

        <!-- In-menu modal for Multiplayer / Options / Credits (no alert()) -->
        <div id="menu-modal-backdrop" class="menu-modal-backdrop" style="display: none;">
            <div class="menu-modal">
                <div class="menu-modal-header">
                    <span id="menu-modal-title"></span>
                    <button id="menu-modal-close" class="menu-modal-close">✕</button>
                </div>
                <div id="menu-modal-body" class="menu-modal-body"></div>
            </div>
        </div>
    </div>

    <!-- Original Game Structure (initially hidden) -->
    <div id="main-container" style="display: none;">
        <!-- Game area - contains the game map -->
        <div id="game-container">
            <canvas id="game-canvas"></canvas>
        </div>
        
        <!-- UI area - for permanent UI elements -->
        <div id="ui-container">
            <div id="equipment-area"></div>
            <div id="stats-area"></div>
            <div id="message-area"></div>
        </div>
        
        <!-- Overlay area - for modal windows like inventory -->
        <div id="overlay-container"></div>
    </div>

    <!-- Scripts -->
    <script type="module" src="src/js/menu.js"></script>
    <script type="module" src="src/js/main.js"></script>
</body>
</html>
